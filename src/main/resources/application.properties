spring.application.name=Safardrop

server.port=8081
spring.config.import=optional:file:./backend.env[.properties]

spring.main.banner-mode=off

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{spring.application.name}] %msg%n

spring.datasource.url=jdbc:mysql://localhost:3306/safardrop_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

app.auth.token-secret=${APP_AUTH_TOKEN_SECRET}
razorpay.key=${RAZORPAY_KEY:}
razorpay.secret=${RAZORPAY_SECRET:}
app.payment.demo-mode=${APP_PAYMENT_DEMO_MODE:true}
