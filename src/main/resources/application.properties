spring.application.name=Safardrop

server.port=${PORT:8081}
spring.config.import=optional:file:./backend.env[.properties]

spring.main.banner-mode=off

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - [%X{spring.application.name}] %msg%n

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./.renderdb/safardrop;MODE=MySQL;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.auth.token-secret=${APP_AUTH_TOKEN_SECRET:temporary-dev-secret-change-me}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://*.vercel.app}
razorpay.key=${RAZORPAY_KEY:}
razorpay.secret=${RAZORPAY_SECRET:}
app.payment.demo-mode=${APP_PAYMENT_DEMO_MODE:true}
